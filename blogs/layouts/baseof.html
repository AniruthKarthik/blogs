<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  {{ $style := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  {{ partial "head.html" . }}
</head>
<body data-theme="light">
  <canvas id="bg-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;"></canvas>
  <div style="position: relative; z-index: 1;">
    {{ partial "header.html" . }}
    
    <main>
      {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
  </div>

  <script>
    // Theme logic
    const body = document.body;
    const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    body.setAttribute('data-theme', currentTheme);

    function toggleTheme() {
      const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    // Search & Filter Logic
    let searchIndex = null;
    const homeSearchInput = document.getElementById('home-search-input');
    const dynamicPostList = document.getElementById('dynamic-post-list');
    const listTitle = document.getElementById('list-title');
    let initialListHTML = dynamicPostList ? dynamicPostList.innerHTML : '';

    async function ensureSearchIndex() {
      if (!searchIndex) {
        const res = await fetch('{{ "index.json" | relURL }}');
        searchIndex = await res.json();
      }
    }

    if (homeSearchInput && dynamicPostList) {
      homeSearchInput.addEventListener('focus', ensureSearchIndex);
      
      homeSearchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        
        if (!query) {
          dynamicPostList.innerHTML = initialListHTML;
          listTitle.textContent = 'Latest Writing';
          return;
        }

        if (!searchIndex) return;

        const filtered = searchIndex.filter(item => 
          item.title.toLowerCase().includes(query) || 
          item.summary.toLowerCase().includes(query) ||
          item.content.toLowerCase().includes(query)
        );

        if (filtered.length > 0) {
          listTitle.textContent = `Found ${filtered.length} matching lore`;
          dynamicPostList.innerHTML = filtered.map(item => `
            <a href="${item.permalink}" class="post-row" style="animation: fadeInUp 0.4s ease-out forwards;">
              <div class="post-row-inner">
                <time class="post-date">${item.date}</time>
                <div class="post-info">
                  <h3 class="post-title" style="font-size: var(--text-lg);">${item.title}</h3>
                  <p class="post-summary" style="font-size: var(--text-sm);">${item.summary}</p>
                </div>
              </div>
            </a>
          `).join('');
        } else {
          listTitle.textContent = 'No lore found';
          dynamicPostList.innerHTML = '<div style="padding: var(--space-12) 0; text-align: center; color: var(--fg-secondary);">The archives are empty for this query.</div>';
        }
      });
    }

    // Code Block Copy Buttons
    document.querySelectorAll('.chroma').forEach((block) => {
      const button = document.createElement('button');
      button.innerText = 'Copy';
      button.style.cssText = 'position: absolute; top: var(--space-2); right: var(--space-2); background: var(--surface); border: 1px solid var(--border); color: var(--fg-secondary); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: var(--text-xs); opacity: 0; transition: opacity 0.2s, background 0.2s;';
      
      block.style.position = 'relative';
      block.appendChild(button);

      block.addEventListener('mouseenter', () => button.style.opacity = '1');
      block.addEventListener('mouseleave', () => button.style.opacity = '0');
      button.addEventListener('mouseenter', () => button.style.background = 'var(--border)');
      button.addEventListener('mouseleave', () => button.style.background = 'var(--surface)');

      button.addEventListener('click', async () => {
        const code = block.querySelector('code')?.innerText;
        if (code) {
          await navigator.clipboard.writeText(code);
          button.innerText = 'Copied!';
          setTimeout(() => button.innerText = 'Copy', 2000);
        }
      });
    });

    // Interactive Background Network
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    let mouse = { x: null, y: null };

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
      mouse.x = null;
      mouse.y = null;
    });

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 1.5 + 0.5;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > width) this.vx = -this.vx;
        if (this.y < 0 || this.y > height) this.vy = -this.vy;
      }
      draw() {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        ctx.fillStyle = isDark ? 'rgba(255, 255, 255, 0.4)' : 'rgba(0, 0, 0, 0.2)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 70; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, width, height);
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      const lineColor = isDark ? '255, 255, 255' : '0, 0, 0';

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      for (let i = 0; i < particles.length; i++) {
        if (mouse.x != null && mouse.y != null) {
          const dx = mouse.x - particles[i].x;
          const dy = mouse.y - particles[i].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${lineColor}, ${0.2 * (1 - dist / 150)})`;
            ctx.lineWidth = 1;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
          }
        }
        
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 100) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${lineColor}, ${0.1 * (1 - dist / 100)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
