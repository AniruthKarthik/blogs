baseURL = "https://AniruthKarthik.github.io/blogs/"
languageCode = "en-us"
title = "Ani's Internet Lore"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "light"
  description = "Internet rabbit holes nobody asked for."
  mainSection = "posts"

  [params.social]
    github = "https://github.com/AniruthKarthik"

  [params.author]
    name = "Ani"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

[markup]
  [markup.highlight]
    noClasses = false
    style = "github-dark"
  [markup.goldmark.renderer]
    unsafe = true
